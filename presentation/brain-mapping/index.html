<style>
/* ─── TOKENS ─── */
:root {
  --bg:         #f5f0e8;
  --surface:    #ebe5d7;
  --paper:      #faf7f2;
  --ink:        #2c2118;
  --ink-2:      #4a3728;
  --ink-light:  #7a6552;
  --border:     #d4c5b0;
  --accent:     #5c4033;
  --accent-2:   #7b5e4a;
  --accent-glow:rgba(92,64,51,0.10);
  --note-bg:    #fff9ee;
  --note-border:#c9a96e;

  /* highlight colors */
  --hl-instinct: rgba(180, 100, 60, 0.13);
  --hl-design:   rgba(60, 120, 180, 0.11);
  --hl-active:   rgba(92, 64, 51, 0.18);
  --hl-border-instinct: #c8905a;
  --hl-border-design:   #5a8abf;
  --hl-border-active:   #5c4033;

  --radius: 10px;
  --serif: 'Nanum Myeongjo', Georgia, 'Times New Roman', serif;
}
[data-theme="dark"] {
  --bg:         #0e0b08;
  --surface:    #161208;
  --paper:      #1a1510;
  --ink:        #e8ddd0;
  --ink-2:      #c4b49e;
  --ink-light:  #8a7868;
  --border:     #2e2418;
  --accent:     #c8a87a;
  --accent-2:   #a08860;
  --accent-glow:rgba(200,168,122,0.08);
  --note-bg:    #1e1810;
  --note-border:#6e5030;

  --hl-instinct: rgba(200,140,80,0.12);
  --hl-design:   rgba(80,150,220,0.12);
  --hl-active:   rgba(200,168,122,0.20);
  --hl-border-instinct: #c8905a;
  --hl-border-design:   #6aaad0;
  --hl-border-active:   #c8a87a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  line-height: 1.85;
  transition: background 0.35s, color 0.35s;
}

/* ─── CONTROLS ─── */
.controls {
  position: fixed;
  top: 1.1rem; right: 1.2rem;
  z-index: 200;
  display: flex;
  gap: 0.5rem;
}
.ctrl-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink);
  border-radius: 6px;
  padding: 0.3rem 0.7rem;
  font-family: var(--serif);
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  letter-spacing: 0.04em;
}
.ctrl-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

/* ─── WRAP ─── */
.wrap { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }

/* ─── HEADER ─── */
.page-header {
  padding: 4.5rem 1.5rem 2.5rem;
  max-width: 860px;
  margin: 0 auto;
}
.eyebrow {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.7rem;
}
.page-title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 0.4rem;
}
.page-sub {
  font-size: 0.88rem;
  color: var(--ink-2);
  font-style: italic;
  margin-bottom: 1.5rem;
}

/* ─── LEGEND ─── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.65rem;
  margin-bottom: 1.5rem;
  align-items: center;
  font-size: 0.78rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  color: var(--ink-2);
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-instinct { background: var(--hl-border-instinct); }
.dot-design   { background: var(--hl-border-design); }

/* ─── BUTTONS ─── */
.toolbar {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 1.8rem;
}
.tool-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink);
  border-radius: 6px;
  padding: 0.35rem 0.85rem;
  font-family: var(--serif);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.04em;
}
.tool-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
.tool-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }

/* ─── SVG CONNECTOR ─── */
#svg-connector {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
.connector-line {
  stroke: var(--accent);
  stroke-width: 1.5;
  stroke-dasharray: 5 3;
  fill: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.connector-line.visible { opacity: 0.55; }

/* ─── TABLE ─── */
.map-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
table.map-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
table.map-table thead th {
  background: var(--surface);
  padding: 0.75rem 1rem;
  text-align: left;
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.map-table tbody tr {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.18s;
}
table.map-table tbody tr:last-child { border-bottom: none; }
table.map-table tbody tr:hover td { background: var(--accent-glow); }
table.map-table td {
  padding: 0.75rem 1rem;
  vertical-align: top;
  line-height: 1.6;
  transition: background 0.2s, border-left 0.2s;
}

/* ─── ROW STATES ─── */
tr.instinct td:first-child { border-left: 3px solid var(--hl-border-instinct); }
tr.design   td:first-child { border-left: 3px solid var(--hl-border-design); }

tr.hl-active td { background: var(--hl-active) !important; }
tr.hl-instinct-on td { background: var(--hl-instinct); }
tr.hl-design-on   td { background: var(--hl-design); }

td.brain-col { font-weight: 700; white-space: nowrap; }
td.sys-col   { color: var(--ink-2); }
td.pc-col    { color: var(--ink-light); font-size: 0.82rem; font-style: italic; }

.row-num {
  display: inline-block;
  width: 1.4rem;
  height: 1.4rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  text-align: center;
  line-height: 1.4rem;
  font-size: 0.7rem;
  color: var(--ink-light);
  margin-right: 0.5rem;
  flex-shrink: 0;
  vertical-align: middle;
}

/* ─── TOOLTIP ─── */
.tooltip {
  position: fixed;
  z-index: 500;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.65rem 1rem;
  max-width: 280px;
  font-size: 0.82rem;
  color: var(--ink-2);
  line-height: 1.6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.tooltip.visible { opacity: 1; }
.tooltip-title {
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.3rem;
  font-size: 0.84rem;
}

/* ─── RANDOM SPOTLIGHT ─── */
.spotlight-bar {
  background: var(--note-bg);
  border-left: 3px solid var(--note-border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.9rem 1.3rem;
  margin: 1.5rem 0;
  font-size: 0.88rem;
  color: var(--ink-2);
  min-height: 3.5rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  transition: background 0.3s;
}
.spotlight-bar .sp-icon { font-size: 1.3rem; flex-shrink:0; }
.spotlight-bar .sp-text { flex: 1; line-height: 1.65; }
.spotlight-bar cite {
  font-style: normal;
  font-size: 0.72rem;
  color: var(--accent-2);
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* ─── CLOSING ─── */
.closing-note {
  background: var(--note-bg);
  border-left: 3px solid var(--note-border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1.1rem 1.5rem;
  margin: 2.5rem 0 4rem;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--ink-2);
  line-height: 1.8;
}
</style>
</head>

─────────────────────────────────*/
let activeLang = localStorage.getItem('bm-lang') || 'ko';
let activeRow = -1;
let filterMode = 'all';

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  ROWS.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.className = r.kind;
    tr.dataset.idx = i;
    const num = `<span class="row-num">${i+1}</span>`;
    tr.innerHTML = `
      <td class="brain-col">${num}<span class="brain-txt" data-ko="${r.brain_ko}" data-en="${r.brain_en}">${r['brain_' + activeLang]}</span></td>
      <td class="sys-col"><span data-ko="${r.sys_ko}" data-en="${r.sys_en}">${r['sys_' + activeLang]}</span></td>
      <td class="pc-col"><span data-ko="${r.pc_ko}" data-en="${r.pc_en}">${r['pc_' + activeLang]}</span></td>
    `;
    tr.addEventListener('click', () => activateRow(i));
    tr.addEventListener('mouseenter', (e) => showTooltip(e, i));
    tr.addEventListener('mouseleave', hideTooltip);
    tr.addEventListener('mousemove', (e) => moveTooltip(e));
    tbody.appendChild(tr);
  });
  applyFilter(filterMode);
}

/* ────────────────────────────────
   ACTIVATE ROW (CLICK)
─────────────────────────────────*/
function activateRow(idx) {
  clearHighlights();
  if (activeRow === idx) { activeRow = -1; return; }
  activeRow = idx;
  const rows = document.querySelectorAll('#table-body tr');
  rows[idx].classList.add('hl-active');
  // draw SVG line between row 0 col and row 0 col (same row, just animate)
  drawConnector(idx);
}

function clearHighlights() {
  document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('hl-active'));
  clearConnector();
}

/* ────────────────────────────────
   SVG CONNECTOR (same row, col 0 → col 2)
─────────────────────────────────*/
function drawConnector(idx) {
  clearConnector();
  const svg = document.getElementById('svg-connector');
  const rows = document.querySelectorAll('#table-body tr');
  if (!rows[idx]) return;
  const tds = rows[idx].querySelectorAll('td');
  if (tds.length < 3) return;
  const r0 = tds[0].getBoundingClientRect();
  const r2 = tds[2].getBoundingClientRect();
  const x1 = r0.right;
  const y1 = r0.top + r0.height / 2;
  const x2 = r2.left;
  const y2 = r2.top + r2.height / 2;
  const cx = (x1 + x2) / 2;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  line.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
  line.setAttribute('class', 'connector-line');
  svg.appendChild(line);
  requestAnimationFrame(() => line.classList.add('visible'));
}

function clearConnector() {
  const svg = document.getElementById('svg-connector');
  svg.innerHTML = '';
}

/* ────────────────────────────────
   TOOLTIP
─────────────────────────────────*/
const tt = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttBody  = document.getElementById('tt-body');

function showTooltip(e, idx) {
  const r = ROWS[idx];
  ttTitle.textContent = r['brain_' + activeLang];
  ttBody.textContent  = r['tip_' + activeLang];
  tt.classList.add('visible');
  moveTooltip(e);
}
function hideTooltip() { tt.classList.remove('visible'); }
function moveTooltip(e) {
  let x = e.clientX + 18;
  let y = e.clientY + 14;
  if (x + 300 > window.innerWidth) x = e.clientX - 300;
  if (y + 120 > window.innerHeight) y = e.clientY - 120;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

/* ────────────────────────────────
   FILTER
─────────────────────────────────*/
function filterRows(mode) {
  filterMode = mode;
  ['btn-all','btn-instinct','btn-design'].forEach(id => {
    document.getElementById(id)?.classList.remove('active');
  });
  const btnId = mode === 'all' ? 'btn-all' : mode === 'instinct' ? 'btn-instinct' : 'btn-design';
  document.getElementById(btnId)?.classList.add('active');
  applyFilter(mode);
  clearHighlights();
  activeRow = -1;
}

function applyFilter(mode) {
  document.querySelectorAll('#table-body tr').forEach(tr => {
    if (mode === 'all') {
      tr.style.display = '';
    } else {
      tr.style.display = tr.classList.contains(mode) ? '' : 'none';
    }
  });
}

/* ────────────────────────────────
   RANDOM SPOTLIGHT
─────────────────────────────────*/
function randomSpotlight() {
  const idx = Math.floor(Math.random() * ROWS.length);
  const r = ROWS[idx];
  clearHighlights();
  activeRow = idx;
  const rows = document.querySelectorAll('#table-body tr');
  // make row visible if filtered out
  filterRows('all');
  rows[idx].classList.add('hl-active');
  rows[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  drawConnector(idx);

  // show spotlight bar
  const bar = document.getElementById('spotlight');
  const sp  = document.getElementById('sp-text');
  const spC = document.getElementById('sp-cite');
  bar.style.display = 'flex';
  sp.textContent  = r['tip_' + activeLang];
  spC.textContent = r['brain_' + activeLang] + ' → ' + r['sys_' + activeLang];
}

/* ────────────────────────────────
   CLEAR ALL
─────────────────────────────────*/
function clearAll() {
  clearHighlights();
  activeRow = -1;
  document.getElementById('spotlight').style.display = 'none';
  filterRows('all');
}

/* ────────────────────────────────
   THEME
─────────────────────────────────*/
(function() {
  const saved = localStorage.getItem('bm-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-btn').textContent = saved === 'dark' ? '낮' : '밤';
})();

function toggleTheme() {
  const el = document.documentElement;
  const isDark = el.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  el.setAttribute('data-theme', next);
  localStorage.setItem('bm-theme', next);
  document.getElementById('theme-btn').textContent = next === 'dark' ? '낮' : '밤';
  if (activeRow >= 0) setTimeout(() => drawConnector(activeRow), 50);
}

/* ────────────────────────────────
   LANG
─────────────────────────────────*/
(function() {
  activeLang = localStorage.getItem('bm-lang') || 'ko';
  if (activeLang !== 'ko') document.getElementById('lang-btn').textContent = 'KO';
})();

function toggleLang() {
  activeLang = activeLang === 'ko' ? 'en' : 'ko';
  localStorage.setItem('bm-lang', activeLang);
  document.getElementById('lang-btn').textContent = activeLang === 'ko' ? 'EN' : 'KO';
  // update static data-ko/en elements
  document.querySelectorAll('[data-ko]').forEach(el => {
    const val = el.getAttribute('data-' + activeLang);
    if (val) el.textContent = val;
  });
  renderTable();
}

/* ────────────────────────────────
   INIT
─────────────────────────────────*/
document.getElementById('btn-all').classList.add('active');
renderTable();

// Redraw connector on scroll/resize (line stays correct)
window.addEventListener('scroll', () => { if (activeRow >= 0) drawConnector(activeRow); });
window.addEventListener('resize', () => { if (activeRow >= 0) drawConnector(activeRow); });
</script>

</body>
</html>
